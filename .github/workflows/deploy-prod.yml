name: Deploy to Production

# ⚠️ ВРЕМЕННО: только ручной запуск (workflow_dispatch)
# Пока не добавлены secrets в GitHub — автодеплой отключен
#
# TODO: после добавления secrets заменить on: на:
# on:
#   push:
#     branches:
#       - master

on:
  workflow_dispatch:  # только ручной запуск через GitHub UI

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production  # требует approval перед деплоем
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check secrets exist
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "❌ ERROR: RENDER_API_KEY not set in GitHub Secrets"
            echo "Add it at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.RENDER_PROD_SERVICE_ID }}" ]; then
            echo "❌ ERROR: RENDER_PROD_SERVICE_ID not set in GitHub Secrets"
            exit 1
          fi
          echo "✅ Secrets configured"

      - name: Deploy to Render Production
        # Требует RENDER_PROD_SERVICE_ID и RENDER_API_KEY в GitHub Secrets
        run: |
          echo "Triggering Render production deploy..."
          # curl -X POST \
          #   -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          #   -H "Accept: application/json" \
          #   https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys
