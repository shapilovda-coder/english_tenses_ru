name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production  # требует approval перед деплоем
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Render Production
        # Требует RENDER_PROD_SERVICE_ID и RENDER_API_KEY в GitHub Secrets
        run: |
          echo "Triggering Render production deploy..."
          # curl -X POST \
          #   -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          #   -H "Accept: application/json" \
          #   https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys
